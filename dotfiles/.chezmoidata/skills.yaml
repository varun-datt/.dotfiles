# Agent Skills manifest — single source of truth for `npx skills` installs.
#
# Consumed by .chezmoitemplates/skills-install.tmpl, which the
# run_onchange_after_skills.* scripts render into `npx skills add` commands.
#
# Each source entry becomes:
#   npx skills add <repo> -s <skill> [-s <skill>...] -g -y
# Use  skills: ["*"]  to install every skill in a repo.
#
# Canonical store is ~/.agents/skills/ (symlinked into each detected agent).
# Skills are NOT vendored into chezmoi — only this manifest is tracked.

skills:
  # Pin target agents instead of auto-detecting installed ones.
  # Auto-detection also picks up "PromptScript" (it claims the shared
  # .agents/skills/ path but is project-only), which then fails every
  # global install with "PromptScript does not support global skill
  # installation". Pinning the agents we actually use avoids that noise.
  agents:
    - github-copilot
    - cursor
  #   - claude-code

  sources:
    # --- Skill authoring & theming ---
    - repo: anthropics/skills
      skills: [frontend-design, skill-creator, theme-factory, pptx]

    # --- Frontend / design / writing ---
    - repo: vercel-labs/agent-skills
      skills: [web-design-guidelines, writing-guidelines]
    - repo: pbakaus/impeccable
      skills: [impeccable]
    - repo: emilkowalski/skill
      skills: [emil-design-eng]

