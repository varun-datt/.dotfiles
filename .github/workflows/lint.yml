name: lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # .tmpl scripts contain Go-template syntax shellcheck can't parse.
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./dotfiles/dot_local/bin
          severity: error
      - uses: JohnnyMorganz/stylua-action@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check dotfiles/dot_config/nvim

  chezmoi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
      - name: Validate templates
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # .chezmoiroot points at dotfiles/; --source avoids needing a symlink.
          chezmoi --source "$GITHUB_WORKSPACE" init --apply=false
          chezmoi --source "$GITHUB_WORKSPACE" apply --dry-run
          chezmoi --source "$GITHUB_WORKSPACE" doctor

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install chezmoi
        shell: pwsh
        run: choco install chezmoi -y --no-progress
      - name: Validate templates
        shell: pwsh
        run: |
          # .chezmoiroot points at dotfiles/; --source avoids needing a symlink.
          chezmoi --source "$env:GITHUB_WORKSPACE" init --apply=false
          chezmoi --source "$env:GITHUB_WORKSPACE" apply --dry-run
          chezmoi --source "$env:GITHUB_WORKSPACE" doctor
