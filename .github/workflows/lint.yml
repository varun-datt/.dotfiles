name: lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # .tmpl scripts contain Go-template syntax shellcheck can't parse.
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./dotfiles/dot_local/bin
          severity: error
      - uses: JohnnyMorganz/stylua-action@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check dotfiles/dot_config/nvim

  chezmoi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
      - name: Validate templates
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # init expects source at ~/.local/share/chezmoi; symlink the checkout.
          mkdir -p "$HOME/.local/share"
          ln -sf "$GITHUB_WORKSPACE" "$HOME/.local/share/chezmoi"
          chezmoi init --apply=false
          chezmoi apply --dry-run
